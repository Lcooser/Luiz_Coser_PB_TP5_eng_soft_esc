name: Deploy

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente de deploy
        required: true
        default: prod
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build application package
        shell: bash
        run: |
          echo "::group::Package build"
          ./gradlew clean bootJar
          mkdir -p build/distributions/tp5-beanstalk
          cp build/libs/tp5-integrado-1.0.0.jar build/distributions/tp5-beanstalk/
          cp Procfile build/distributions/tp5-beanstalk/
          cd build/distributions/tp5-beanstalk
          zip -r ../tp5-beanstalk.zip .
          echo "::endgroup::"
          echo "::notice title=Deploy::Artefato pronto para distribuicao."

      - name: Upload deploy package
        uses: actions/upload-artifact@v4
        with:
          name: tp5-package
          path: build/distributions/tp5-beanstalk.zip
          if-no-files-found: error
          retention-days: 15

      - name: Publish package summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Pacote de Deploy"
            echo
            echo "- Artefato gerado: \`tp5-beanstalk.zip\`"
            echo "- Fluxo pronto para distribuir o mesmo pacote entre dev, test e prod"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-dev:
    name: Deploy Dev
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    needs: build-package
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Download deploy package
        uses: actions/download-artifact@v4
        with:
          name: tp5-package
          path: package

      - name: Validate environment configuration
        shell: bash
        run: |
          echo "::group::Preflight dev"
          test -n "${{ vars.APP_BASE_URL }}"
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.EB_APPLICATION_NAME }}"
          test -n "${{ vars.EB_ENVIRONMENT_NAME }}"
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}"
          echo "::endgroup::"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve deploy metadata
        id: metadata
        shell: bash
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          VERSION_LABEL="dev-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          BUNDLE_BUCKET="elasticbeanstalk-${{ vars.AWS_REGION }}-${ACCOUNT_ID}"
          BUNDLE_KEY="${{ vars.EB_APPLICATION_NAME }}/deployments/${VERSION_LABEL}.zip"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "version_label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"
          echo "bundle_bucket=${BUNDLE_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "bundle_key=${BUNDLE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Upload bundle to S3
        shell: bash
        run: aws s3 cp package/tp5-beanstalk.zip "s3://${{ steps.metadata.outputs.bundle_bucket }}/${{ steps.metadata.outputs.bundle_key }}"

      - name: Create Elastic Beanstalk application version
        shell: bash
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ vars.EB_APPLICATION_NAME }}" \
            --version-label "${{ steps.metadata.outputs.version_label }}" \
            --source-bundle S3Bucket="${{ steps.metadata.outputs.bundle_bucket }}",S3Key="${{ steps.metadata.outputs.bundle_key }}"

      - name: Deploy to Elastic Beanstalk
        shell: bash
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ vars.EB_ENVIRONMENT_NAME }}" \
            --version-label "${{ steps.metadata.outputs.version_label }}"

      - name: Wait for environment update
        shell: bash
        run: aws elasticbeanstalk wait environment-updated --environment-names "${{ vars.EB_ENVIRONMENT_NAME }}"

      - name: Publish deploy summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Deploy Dev"
            echo
            echo "- Ambiente: dev"
            echo "- URL: ${{ vars.APP_BASE_URL }}"
            echo "- Aplicacao Elastic Beanstalk: ${{ vars.EB_APPLICATION_NAME }}"
            echo "- Ambiente Elastic Beanstalk: ${{ vars.EB_ENVIRONMENT_NAME }}"
            echo "- Autenticacao: OIDC com AWS"
          } >> "$GITHUB_STEP_SUMMARY"

  selenium-dev:
    name: Selenium Dev
    if: needs.deploy-dev.result == 'success'
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run post-deploy Selenium tests
        shell: bash
        run: |
          echo "::group::Selenium dev"
          ./gradlew postDeployTest -PappBaseUrl="${{ vars.APP_BASE_URL }}"
          echo "::endgroup::"

      - name: Publish Selenium summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Selenium Dev"
            echo
            echo "- Smoke test pos-deploy executado em ${{ vars.APP_BASE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"

  dast-dev:
    name: DAST Dev
    if: needs.selenium-dev.result == 'success'
    needs: selenium-dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.APP_BASE_URL }}
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-dev-report

      - name: Publish DAST summary
        if: always()
        shell: bash
        run: |
          {
            echo "## DAST Dev"
            echo
            echo "- ZAP baseline executado em ${{ vars.APP_BASE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-test:
    name: Deploy Test
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'test')
    needs: build-package
    runs-on: ubuntu-latest
    environment:
      name: test
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Download deploy package
        uses: actions/download-artifact@v4
        with:
          name: tp5-package
          path: package

      - name: Validate environment configuration
        shell: bash
        run: |
          echo "::group::Preflight test"
          test -n "${{ vars.APP_BASE_URL }}"
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.EB_APPLICATION_NAME }}"
          test -n "${{ vars.EB_ENVIRONMENT_NAME }}"
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}"
          echo "::endgroup::"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve deploy metadata
        id: metadata
        shell: bash
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          VERSION_LABEL="test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          BUNDLE_BUCKET="elasticbeanstalk-${{ vars.AWS_REGION }}-${ACCOUNT_ID}"
          BUNDLE_KEY="${{ vars.EB_APPLICATION_NAME }}/deployments/${VERSION_LABEL}.zip"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "version_label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"
          echo "bundle_bucket=${BUNDLE_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "bundle_key=${BUNDLE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Upload bundle to S3
        shell: bash
        run: aws s3 cp package/tp5-beanstalk.zip "s3://${{ steps.metadata.outputs.bundle_bucket }}/${{ steps.metadata.outputs.bundle_key }}"

      - name: Create Elastic Beanstalk application version
        shell: bash
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ vars.EB_APPLICATION_NAME }}" \
            --version-label "${{ steps.metadata.outputs.version_label }}" \
            --source-bundle S3Bucket="${{ steps.metadata.outputs.bundle_bucket }}",S3Key="${{ steps.metadata.outputs.bundle_key }}"

      - name: Deploy to Elastic Beanstalk
        shell: bash
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ vars.EB_ENVIRONMENT_NAME }}" \
            --version-label "${{ steps.metadata.outputs.version_label }}"

      - name: Wait for environment update
        shell: bash
        run: aws elasticbeanstalk wait environment-updated --environment-names "${{ vars.EB_ENVIRONMENT_NAME }}"

      - name: Publish deploy summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Deploy Test"
            echo
            echo "- Ambiente: test"
            echo "- URL: ${{ vars.APP_BASE_URL }}"
            echo "- Aplicacao Elastic Beanstalk: ${{ vars.EB_APPLICATION_NAME }}"
            echo "- Ambiente Elastic Beanstalk: ${{ vars.EB_ENVIRONMENT_NAME }}"
            echo "- Trigger principal: release publicada"
          } >> "$GITHUB_STEP_SUMMARY"

  selenium-test:
    name: Selenium Test
    if: needs.deploy-test.result == 'success'
    needs: deploy-test
    runs-on: ubuntu-latest
    environment:
      name: test
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run post-deploy Selenium tests
        shell: bash
        run: |
          echo "::group::Selenium test"
          ./gradlew postDeployTest -PappBaseUrl="${{ vars.APP_BASE_URL }}"
          echo "::endgroup::"

      - name: Publish Selenium summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Selenium Test"
            echo
            echo "- Smoke test pos-deploy executado em ${{ vars.APP_BASE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"

  dast-test:
    name: DAST Test
    if: needs.selenium-test.result == 'success'
    needs: selenium-test
    runs-on: ubuntu-latest
    environment:
      name: test
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.APP_BASE_URL }}
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-test-report

      - name: Publish DAST summary
        if: always()
        shell: bash
        run: |
          {
            echo "## DAST Test"
            echo
            echo "- ZAP baseline executado em ${{ vars.APP_BASE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-prod:
    name: Deploy Prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    needs: build-package
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Download deploy package
        uses: actions/download-artifact@v4
        with:
          name: tp5-package
          path: package

      - name: Validate environment configuration
        shell: bash
        run: |
          echo "::group::Preflight prod"
          test -n "${{ vars.APP_BASE_URL }}"
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.EB_APPLICATION_NAME }}"
          test -n "${{ vars.EB_ENVIRONMENT_NAME }}"
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}"
          echo "::endgroup::"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve deploy metadata
        id: metadata
        shell: bash
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          VERSION_LABEL="prod-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          BUNDLE_BUCKET="elasticbeanstalk-${{ vars.AWS_REGION }}-${ACCOUNT_ID}"
          BUNDLE_KEY="${{ vars.EB_APPLICATION_NAME }}/deployments/${VERSION_LABEL}.zip"
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "version_label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"
          echo "bundle_bucket=${BUNDLE_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "bundle_key=${BUNDLE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Upload bundle to S3
        shell: bash
        run: aws s3 cp package/tp5-beanstalk.zip "s3://${{ steps.metadata.outputs.bundle_bucket }}/${{ steps.metadata.outputs.bundle_key }}"

      - name: Create Elastic Beanstalk application version
        shell: bash
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ vars.EB_APPLICATION_NAME }}" \
            --version-label "${{ steps.metadata.outputs.version_label }}" \
            --source-bundle S3Bucket="${{ steps.metadata.outputs.bundle_bucket }}",S3Key="${{ steps.metadata.outputs.bundle_key }}"

      - name: Deploy to Elastic Beanstalk
        shell: bash
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ vars.EB_ENVIRONMENT_NAME }}" \
            --version-label "${{ steps.metadata.outputs.version_label }}"

      - name: Wait for environment update
        shell: bash
        run: aws elasticbeanstalk wait environment-updated --environment-names "${{ vars.EB_ENVIRONMENT_NAME }}"

      - name: Publish deploy summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Deploy Prod"
            echo
            echo "- Ambiente: prod"
            echo "- URL: ${{ vars.APP_BASE_URL }}"
            echo "- Aplicacao Elastic Beanstalk: ${{ vars.EB_APPLICATION_NAME }}"
            echo "- Ambiente Elastic Beanstalk: ${{ vars.EB_ENVIRONMENT_NAME }}"
            echo "- Aprovacao manual controlada pelas regras do ambiente"
          } >> "$GITHUB_STEP_SUMMARY"

  selenium-prod:
    name: Selenium Prod
    if: needs.deploy-prod.result == 'success'
    needs: deploy-prod
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run post-deploy Selenium tests
        shell: bash
        run: |
          echo "::group::Selenium prod"
          ./gradlew postDeployTest -PappBaseUrl="${{ vars.APP_BASE_URL }}"
          echo "::endgroup::"

      - name: Publish Selenium summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Selenium Prod"
            echo
            echo "- Smoke test pos-deploy executado em ${{ vars.APP_BASE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"

  dast-prod:
    name: DAST Prod
    if: needs.selenium-prod.result == 'success'
    needs: selenium-prod
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ vars.APP_BASE_URL }}
    steps:
      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.APP_BASE_URL }}
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-prod-report

      - name: Publish DAST summary
        if: always()
        shell: bash
        run: |
          {
            echo "## DAST Prod"
            echo
            echo "- ZAP baseline executado em ${{ vars.APP_BASE_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
