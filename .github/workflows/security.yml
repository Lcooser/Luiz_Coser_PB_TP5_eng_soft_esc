name: Security

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build source for analysis
        shell: bash
        run: |
          echo "::group::CodeQL build"
          ./gradlew classes testClasses
          echo "::endgroup::"

      - name: Analyze
        uses: github/codeql-action/analyze@v3

      - name: Publish SAST summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Resultado do SAST"
            echo
            echo "- CodeQL executado para Java"
            echo "- Build auxiliar para analise concluido com Gradle"
          } >> "$GITHUB_STEP_SUMMARY"

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

      - name: Publish dependency summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Revisao de Dependencias"
            echo
            echo "- Analise de dependencias executada no pull request"
            echo "- Build bloqueado para riscos a partir de severidade moderada"
          } >> "$GITHUB_STEP_SUMMARY"
